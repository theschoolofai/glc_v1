  Tasks to Complete — With Full Detail

  Task 1: Design schemas.py (Pydantic types for Discord wire format)

  File: glc/channels/catalogue/discord/schemas.py

  The mock's dispatch payload is:
  {
    "op": 0, "t": "MESSAGE_CREATE", "s": 1,
    "d": {
      "id": "msg-1",
      "channel_id": "444555666",
      "guild_id": "111222333",
      "author": {"id": "42", "username": "owner", "discriminator": "0001", ...},
      "content": "hello",
      "timestamp": "2026-06-17T12:00:00.000000+00:00",
      "mentions": [{"id": "...", "username": "alice", ...}],
      ...
    }
  }

  Define:
  - DiscordUser — id, username, discriminator, global_name, bot
  - DiscordMessageData — id, channel_id, guild_id, author: DiscordUser, content, timestamp, mentions: list[DiscordUser]
  - DiscordGatewayFrame — op, t, s, d: DiscordMessageData

  These give the rest of the adapter typed .d.author.id access instead of raw raw["d"]["author"]["id"] dict access.

