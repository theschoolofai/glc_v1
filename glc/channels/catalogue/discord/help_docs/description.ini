  Task 4: Implement send — outbound REST payload

  File: glc/channels/catalogue/discord/adapter.py

  Discord's POST /channels/{channel_id}/messages body must have content and must NOT default tts: true.

  async def send(self, reply: ChannelReply) -> Any:
      body = {"content": reply.text or ""}
      mock = self.config.get("mock")
      if mock is not None:
          return await mock.send(body)
      # real path: httpx POST with Authorization: Bot <token>
      ...

  This satisfies Test 3 (test_send_emits_valid_wire_payload) and Test 5 (test_rate_limit_propagates_429) — the mock returns {"status": 429, "retry_after": 1.234, ...} when mock.rate_limited = True, and your adapter returns
  that dict directly.

