  Task 6: Implement mention resolution (the behavioural test)

  File: glc/channels/catalogue/discord/adapter.py

  Discord encodes mentions as <@USER_ID> tokens in content, and also provides a mentions array of User objects in d["mentions"]. Use the mentions array (authoritative) or regex-parse content as fallback:

  import re

  def _resolve_mentions(self, d: dict, mock) -> list[str]:
      resolved = []
      for user in d.get("mentions", []):
          if mock is not None:
              u = mock.get_user(user["id"])
              if u:
                  resolved.append(u["username"])
          else:
              resolved.append(user.get("username", user["id"]))
      return resolved

  Then set metadata={"mentions": resolved} in the ChannelMessage.

  This satisfies Test 7 (test_channel_specific_behaviour_mention_resolution) — the test asserts "alice" appears in msg.metadata["mentions"].

