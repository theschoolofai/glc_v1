# Posts the scorecard.md generated by Adapter PR back as a comment on the
# originating pull request.
#
# Why a separate workflow with workflow_run?
#
# Adapter PR runs on pull_request, which means PRs from forks get a
# read-only GITHUB_TOKEN regardless of any declared `permissions: write`
# block. The token cannot post comments. workflow_run runs in the
# upstream repo's context with a full-permission token, so it can post
# the comment back to the originating PR.
#
# Security note: this workflow does NOT check out the PR's code. It only
# downloads the scorecard.md artifact (generated by Adapter PR with the
# read-only token) and uses the PR number embedded in the artifact to
# post the comment. There is no execution of fork-supplied code here.

name: Scorecard Comment

on:
  workflow_run:
    workflows: [Adapter PR]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Download scorecard artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: scorecard
        continue-on-error: true
      - name: Post scorecard comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ ! -f scorecard.md ] || [ ! -f pr_number.txt ]; then
            echo "No scorecard artifact found. Adapter PR run likely failed before the scorecard step."
            exit 0
          fi
          PR_NUMBER=$(cat pr_number.txt | tr -d '[:space:]')
          if [ -z "$PR_NUMBER" ]; then
            echo "pr_number.txt is empty. Cannot post comment."
            exit 0
          fi
          echo "Posting scorecard to PR #$PR_NUMBER"
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file scorecard.md
